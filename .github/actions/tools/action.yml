name: pinned tools
description: Restore or build the pinned cargo tool binaries shared by every workflow.

runs:
  using: composite
  steps:
    - id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cargo-tools
        key: tools-${{ runner.os }}-prek0.4.9-typos1.48.0-nextest0.9.140-deny0.20.2-shear1.13.1-llvmcov0.8.7-mutants27.1.0-fuzz0.13.2-zizmor1.26.1
    - if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: >-
        cargo install --locked --root ~/.cargo-tools
        prek@0.4.9
        typos-cli@1.48.0
        cargo-nextest@0.9.140
        cargo-deny@0.20.2
        cargo-shear@1.13.1
        cargo-llvm-cov@0.8.7
        cargo-mutants@27.1.0
        cargo-fuzz@0.13.2
        zizmor@1.26.1
    # Exporting the tool directory onto PATH is this composite's whole point. The
    # value is a fixed name under the runner's own HOME, and what sits inside it
    # is the pinned installs above, so nothing candidate-controlled is written.
    - shell: bash
      run: echo "$HOME/.cargo-tools/bin" >> "$GITHUB_PATH" # zizmor: ignore[github-env]
