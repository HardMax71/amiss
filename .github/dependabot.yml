version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      cargo:
        patterns: ["*"]
  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    allow:
      - dependency-name: libfuzzer-sys
      - dependency-name: arbitrary
    groups:
      fuzz-cargo:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]
