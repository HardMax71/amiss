name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: Reviewed release label, for example 0.1.0-experimental
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: macos-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }} -p amiss -p amiss-bootstrap
      - shell: bash
        run: |
          set -eu
          mkdir -p staged
          suffix=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then suffix=".exe"; fi
          cp "target/${{ matrix.target }}/release/amiss$suffix" "staged/amiss-${{ matrix.platform }}$suffix"
          cp "target/${{ matrix.target }}/release/amiss-bootstrap$suffix" "staged/bootstrap-${{ matrix.platform }}$suffix"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: staged/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: engine-${{ matrix.platform }}
          path: staged/

  manifest:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: engine-*
          merge-multiple: true
          path: engines
      - run: cargo build --release --locked -p amiss-bootstrap --bin amiss-manifest
      # The action tree is data: the canonical action.yml, the strict manifest,
      # the launcher, and the platform binaries. The manifest builder derives
      # every platform row from the artifact's own header. The launcher is a
      # reviewed file in this repository, not a string this workflow prints,
      # because the manifest pins its bytes and someone has to have read them.
      # The dispatch input and the repository identity reach the script through
      # the environment rather than through ${{ }} expansion into its body: the
      # version is free text typed at dispatch time, and text expanded into a
      # run block is code.
      - shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          TAG_NAME: ${{ github.ref_name }}
          SERVER_URL: ${{ github.server_url }}
          OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.repository }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_VERSION:-${TAG_NAME#v}}"
          WORKSPACE_VERSION="$(cargo metadata --locked --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "amiss") | .version')"
          if [ "$VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "release version ${VERSION} does not match workspace ${WORKSPACE_VERSION}"
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE}" = tag ] && [ "$TAG_NAME" != "v${WORKSPACE_VERSION}" ]; then
            echo "release tag ${TAG_NAME} does not match workspace v${WORKSPACE_VERSION}"
            exit 1
          fi
          HOST="${SERVER_URL#*://}"
          HOST="${HOST%/}"
          mkdir -p action-tree/dist
          cp Cargo.lock action-tree/Cargo.lock
          cp LICENSE.md action-tree/LICENSE.md
          bash scripts/release-licenses.sh action-tree/THIRD_PARTY_LICENSES.txt
          install -m 0644 crates/amiss/action/launcher.js action-tree/dist/launcher.js
          install -m 0644 crates/amiss/action/runtime.yml action-tree/action.yml
          args=""
          for binary in engines/amiss-*; do
            name="$(basename "$binary")"
            install -m 0755 "$binary" "action-tree/dist/$name"
            args="$args --artifact dist/$name"
          done
          # shellcheck disable=SC2086
          digest="$(./target/release/amiss-manifest \
            --tree action-tree \
            --version "$VERSION" \
            --host "$HOST" \
            --owner "${OWNER,,}" \
            --repository "$(basename "$REPOSITORY")" \
            --commit "$COMMIT" \
            --lock Cargo.lock \
            --action action.yml \
            --launcher dist/launcher.js \
            $args)"
          printf 'release_manifest_digest=%s\n' "$digest" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$digest" > action-tree/release-manifest.digest
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: action-tree
          path: action-tree/

  # The assembled tree becomes the refs a workflow pins: the immutable
  # action/vX.Y.Z tag for exact pins, and the moving major branch, v0 for the
  # 0.x series and v1 from 1.0.0 on, so one series can never rewrite
  # another's ref. Only a version tag publishes; a dispatch run is a
  # rehearsal that stops at the artifact.
  publish-action:
    if: github.ref_type == 'tag'
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: action-publication-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    outputs:
      advance-major: ${{ steps.publish.outputs.advance-major }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-tree
          path: tree
      - id: publish
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd tree
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          tree="$(git write-tree)"
          # the helper reads the token from the environment at callback time:
          # nothing lands in a config file, a remote URL, or the process list
          helper='!f() { printf "username=x-access-token\npassword=%s\n" "$TOKEN"; }; f'
          remote="https://github.com/${REPOSITORY}.git"
          major="${TAG%%.*}"
          version="${TAG#v}"
          exact_ref="refs/tags/action/${TAG}"
          major_ref="refs/heads/${major}"

          exact="$(git ls-remote --refs "$remote" "$exact_ref" | awk '{print $1}')"
          current="$(git ls-remote --heads "$remote" "$major_ref" | awk '{print $1}')"
          if [ -n "$current" ]; then
            git fetch -q --no-tags "$remote" "$major_ref"
            current="$(git rev-parse FETCH_HEAD)"
          fi

          advance_major=true
          if [[ "$version" == *-* ]]; then
            advance_major=false
          elif [ -n "$current" ]; then
            current_version="$(git show "${current}:release-manifest.json" | jq -r '.engine_version')"
            newest="$(printf '%s\n%s\n' "$current_version" "$version" | sort -V | tail -n 1)"
            if [ "$newest" = "$current_version" ] && [ "$current_version" != "$version" ]; then
              advance_major=false
            elif [ "$current_version" = "$version" ] && [ -z "$exact" ]; then
              echo "${major_ref} already carries ${version}, but ${exact_ref} is absent"
              exit 1
            fi
          fi

          if [ -n "$exact" ]; then
            git fetch -q --no-tags "$remote" "$exact_ref"
            exact="$(git rev-parse FETCH_HEAD)"
            if [ "$(git rev-parse "${exact}^{tree}")" != "$tree" ]; then
              echo "${exact_ref} already exists with different content"
              exit 1
            fi
            commit="$exact"
          elif [ -n "$current" ]; then
            commit="$(printf 'amiss action tree for %s\n' "$TAG" | git commit-tree "$tree" -p "$current")"
          else
            commit="$(printf 'amiss action tree for %s\n' "$TAG" | git commit-tree "$tree")"
          fi

          push=(git -c credential.helper= -c credential.helper="$helper" push -q "$remote")
          if [ -z "$exact" ]; then
            "${push[@]}" "$commit:$exact_ref"
          fi

          remote_exact="$(git ls-remote --refs "$remote" "$exact_ref" | awk '{print $1}')"
          [ "$remote_exact" = "$commit" ]
          printf 'advance-major=%s\n' "$advance_major" >> "$GITHUB_OUTPUT"

  smoke-action:
    if: github.ref_type == 'tag'
    needs: publish-action
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: action/${{ github.ref_name }}
          path: action-under-test
          persist-credentials: false
      - id: exact
        uses: ./action-under-test
        with:
          profile: observe
          annotations: "false"
      - shell: bash
        env:
          EXIT_CLASS: ${{ steps.exact.outputs.exit-class }}
          REPORT: ${{ steps.exact.outputs.report }}
        run: |
          set -euo pipefail
          [ "$EXIT_CLASS" = 0 ]
          jq -e '.schema == "amiss/scanner-report-envelope"' "$REPORT" > /dev/null
      - id: dispatcher
        uses: ./
        with:
          profile: observe
          annotations: "false"
      - shell: bash
        env:
          EXIT_CLASS: ${{ steps.dispatcher.outputs.exit-class }}
          REPORT: ${{ steps.dispatcher.outputs.report }}
        run: |
          set -euo pipefail
          [ "$EXIT_CLASS" = 0 ]
          jq -e '.schema == "amiss/scanner-report-envelope"' "$REPORT" > /dev/null

  publish-release:
    if: github.ref_type == 'tag'
    needs: [publish-action, smoke-action]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: action-major-promotion
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - id: promote
        shell: bash
        env:
          ADVANCE_MAJOR: ${{ needs.publish-action.outputs.advance-major }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$ADVANCE_MAJOR" != true ]; then
            printf 'major-is-latest=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git init -q promotion
          cd promotion
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          helper='!f() { printf "username=x-access-token\npassword=%s\n" "$TOKEN"; }; f'
          remote="https://github.com/${REPOSITORY}.git"
          version="${TAG#v}"
          exact_ref="refs/tags/action/${TAG}"
          major_ref="refs/heads/${TAG%%.*}"
          git fetch -q --no-tags "$remote" "$exact_ref"
          exact="$(git rev-parse FETCH_HEAD)"
          exact_tree="$(git rev-parse "${exact}^{tree}")"
          push=(git -c credential.helper= -c credential.helper="$helper" push -q "$remote")

          for attempt in 1 2 3 4 5; do
            current="$(git ls-remote --heads "$remote" "$major_ref" | awk '{print $1}')"
            if [ -n "$current" ]; then
              git fetch -q --no-tags "$remote" "$major_ref"
              current="$(git rev-parse FETCH_HEAD)"
              current_version="$(git show "${current}:release-manifest.json" | jq -r '.engine_version')"
              newest="$(printf '%s\n%s\n' "$current_version" "$version" | sort -V | tail -n 1)"
              if [ "$newest" = "$current_version" ] && [ "$current_version" != "$version" ]; then
                printf 'major-is-latest=false\n' >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ "$current_version" = "$version" ]; then
                if [ "$(git rev-parse "${current}^{tree}")" != "$exact_tree" ]; then
                  echo "${major_ref} already carries ${version} with different content"
                  exit 1
                fi
                printf 'major-is-latest=true\n' >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi

            if [ -z "$current" ] || git merge-base --is-ancestor "$current" "$exact"; then
              commit="$exact"
            else
              commit="$(printf 'amiss action tree for %s\n' "$TAG" \
                | git commit-tree "$exact_tree" -p "$current")"
            fi
            if "${push[@]}" "$commit:$major_ref"; then
              remote_major="$(git ls-remote --heads "$remote" "$major_ref" | awk '{print $1}')"
              [ "$remote_major" = "$commit" ]
              printf 'major-is-latest=true\n' >> "$GITHUB_OUTPUT"
              exit 0
            fi
            observed="$(git ls-remote --heads "$remote" "$major_ref" | awk '{print $1}')"
            if [ "$observed" = "$current" ]; then
              echo "${major_ref} failed to advance without a concurrent update"
              exit 1
            fi
            if [ "$attempt" = 5 ]; then
              echo "${major_ref} changed during every promotion attempt"
              exit 1
            fi
          done
      - env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          MAJOR_IS_LATEST: ${{ steps.promote.outputs.major-is-latest }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/${REPOSITORY}/releases/tags/${TAG}")"
          if [ "$(jq -r '.draft' <<<"$release")" != true ]; then
            echo "${TAG} is already public"
            exit 0
          fi
          latest=false
          if [ "$MAJOR_IS_LATEST" = true ] && [ "$(jq -r '.prerelease' <<<"$release")" = false ]; then
            latest=true
          fi
          id="$(jq -r '.id' <<<"$release")"
          gh api --method PATCH "repos/${REPOSITORY}/releases/${id}" \
            -F draft=false -f make_latest="$latest" > /dev/null
