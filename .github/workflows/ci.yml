name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/tools
      # Branch runs only restore; main saves the pruned caches, so lock bumps
      # on branches cannot crowd the shared budget and evict small entries.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            controller
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: prek run --all-files
      - run: prek run --all-files --hook-stage pre-push
      - run: cargo nextest run -p amiss-scan --test eligibility --release --locked

  # The scanner reads its own repository under enforce, through the very
  # action a consumer pins: the engine is built from this pull request, the
  # tree is assembled with the release recipe, and the composite derives the
  # commits, verifies the manifest, runs, and annotates. One job dogfoods the
  # engine and the whole distribution lane.
  self-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pull requests check out at the consumer default of 2 so every PR
          # records the shallow path; a push can move main by several commits,
          # and the event's before must be in the checkout, so pushes stay 0.
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --locked --release -p amiss -p amiss-bootstrap
      - shell: bash
        env:
          SERVER_URL: ${{ github.server_url }}
          OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.repository }}
          COMMIT: ${{ github.sha }}
        run: |
          set -eu
          mkdir -p action-tree/dist
          cp Cargo.lock action-tree/Cargo.lock
          cp LICENSE.md action-tree/LICENSE.md
          bash scripts/release-licenses.sh action-tree/THIRD_PARTY_LICENSES.txt
          install -m 0644 crates/amiss/action/launcher.js action-tree/dist/launcher.js
          install -m 0644 crates/amiss/action/runtime.yml action-tree/action.yml
          install -m 0755 target/release/amiss action-tree/dist/amiss-linux-x86_64
          HOST="${SERVER_URL#*://}"
          HOST="${HOST%/}"
          ./target/release/amiss-manifest \
            --tree action-tree \
            --version 0.0.0-smoke \
            --host "$HOST" \
            --owner "${OWNER,,}" \
            --repository "$(basename "$REPOSITORY")" \
            --commit "$COMMIT" \
            --lock Cargo.lock \
            --action action.yml \
            --launcher dist/launcher.js \
            --artifact dist/amiss-linux-x86_64
      - id: action
        uses: ./action-tree
        with:
          profile: enforce
      - if: always() && steps.action.outputs.report != ''
        shell: bash
        env:
          EXIT_CLASS: ${{ steps.action.outputs.exit-class }}
          REPORT: ${{ steps.action.outputs.report }}
        run: |
          set -eu
          echo "exit class ${EXIT_CLASS}"
          jq -e '.schema == "amiss/scanner-report-envelope"' "$REPORT" > /dev/null
          jq -e '.payload.schema == "amiss/scanner-report-payload"' "$REPORT" > /dev/null
          jq -e '.payload.feedback.status == "available"' "$REPORT" > /dev/null
          jq -e '.payload.evaluation.forge == "github"' "$REPORT" > /dev/null
          jq -e '.payload.documents | length > 0' "$REPORT" > /dev/null
      # The staged-index lane in hosted CI: the checkout's clean index against
      # the parent commit, recording that event-matrix row on every run.
      - shell: bash
        run: |
          set -eu
          ./target/release/amiss check --repo . --object-format sha1 \
            --base "$(git rev-parse HEAD^)" --index \
            --profile observe --format json > /dev/null

  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Verify the committed fuzz lockfile
        run: cargo test --locked --release
        working-directory: fuzz

  platform-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      # Full debuginfo made the Windows target cache 2.2 GiB of PDBs; line
      # tables keep file:line backtraces and cut the blob and the MSVC links.
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-nextest@0.9.140
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            controller
            fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo nextest run --workspace --locked
      - run: cargo nextest run --manifest-path controller/Cargo.toml --workspace --locked
      - run: cargo nextest run -p amiss-scan --test eligibility --release --locked
      - name: Verify the committed fuzz lockfile
        run: cargo test --locked --release
        working-directory: fuzz

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/tools
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: rustup component add llvm-tools-preview
      - run: cargo llvm-cov nextest --workspace --locked --lcov --output-path lcov.info
      - run: cargo llvm-cov report
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
