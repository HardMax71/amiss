name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/tools
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: gates-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: gates-
      - run: prek run --all-files
      - run: prek run --all-files --hook-stage pre-push
      - run: cargo nextest run -p amiss-scan --test eligibility --release --locked

  self-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2 # a scan needs a base, and on a merge checkout HEAD~1 is the pull request's
          persist-credentials: false
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: self-scan-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: self-scan-
      - run: cargo build --locked --release --bin amiss
      # The repository and branch names arrive as environment variables rather than
      # as ${{ }} expansions inside the script, because a branch may be named
      # anything and a workflow that pastes a branch name into a command line runs
      # it. The owner is lowercased here: github.repository keeps the capitals the
      # owner signed up with, and the scanner refuses a non-canonical identity.
      - name: the scanner reads its own repository under enforce
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          status=0
          ./target/release/amiss \
            check \
            --repo . \
            --object-format sha1 \
            --base "$(git rev-parse HEAD~1)" \
            --candidate "$(git rev-parse HEAD)" \
            --repository "github.com/${REPOSITORY,,}" \
            --ref "refs/heads/${BRANCH}" \
            --default-branch-ref "refs/heads/${DEFAULT_BRANCH}" \
            --profile enforce \
            --format json > amiss-report.json || status=$?
          echo "amiss exit ${status}"
          # The failing rows come out of the report rather than out of --format
          # human. The human projection is capped at the first 200 findings in
          # canonical order, so in a repository carrying hundreds of records it can
          # print every one of them and still never show the one that blocked.
          if [ "${status}" -ne 0 ] && [ -s amiss-report.json ]; then
            jq -r '.payload.errors[]
                   | "error  \(.code)  phase \(.phase)  \(.path // "-")"' amiss-report.json
            jq -r '.payload.findings[]
                   | select(.effective_disposition == "fail")
                   | "fail   \(.kind)  \(.location.path)  bytes \(.location.span.start_byte)-\(.location.span.end_byte)"' amiss-report.json
          fi
          exit "${status}"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: amiss-self-report
          path: amiss-report.json

  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            fuzz/target
          key: fuzz-smoke-${{ hashFiles('rust-toolchain.toml', 'fuzz/Cargo.lock') }}
          restore-keys: fuzz-smoke-
      - run: cargo test --locked --release
        working-directory: fuzz

  platform-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: nextest
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo-tools
          key: tools-${{ runner.os }}-nextest0.9.140
      - if: steps.nextest.outputs.cache-hit != 'true'
        run: cargo install --locked --root ~/.cargo-tools cargo-nextest@0.9.140
      - shell: bash
        run: echo "$HOME/.cargo-tools/bin" >> "$GITHUB_PATH"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            fuzz/target
          key: platform-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'fuzz/Cargo.lock') }}
          restore-keys: platform-${{ runner.os }}-
      - run: cargo nextest run --workspace --locked
      - run: cargo nextest run -p amiss-scan --test eligibility --release --locked
      - run: cargo test --locked --release
        working-directory: fuzz

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/tools
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: coverage-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: coverage-
      - run: rustup component add llvm-tools-preview
      - run: cargo llvm-cov nextest --workspace --locked --lcov --output-path lcov.info
      - run: cargo llvm-cov report
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
