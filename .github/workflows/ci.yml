name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/tools
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: gates-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: gates-
      - run: prek run --all-files
      - run: prek run --all-files --hook-stage pre-push
      - run: cargo nextest run -p amiss-scan --test eligibility --release --locked

  # The scanner reads its own repository under enforce, through the very
  # action a consumer pins: the engine is built from this pull request, the
  # tree is assembled with the release recipe, and the composite derives the
  # commits, verifies the manifest, runs, and annotates. One job dogfoods the
  # engine and the whole distribution lane.
  self-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2 # a scan needs a base, and on a merge checkout HEAD~1 is the pull request's
          persist-credentials: false
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: self-scan-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: self-scan-
      - run: cargo build --locked --release -p amiss -p amiss-bootstrap
      - shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.repository }}
          COMMIT: ${{ github.sha }}
        run: |
          set -eu
          mkdir -p action-tree/dist
          cp Cargo.lock action-tree/Cargo.lock
          install -m 0644 action/launcher.js action-tree/dist/launcher.js
          install -m 0644 action/action.yml action-tree/action.yml
          install -m 0755 target/release/amiss action-tree/dist/amiss-linux-x86_64
          ./target/release/amiss-manifest \
            --tree action-tree \
            --version 0.0.0-smoke \
            --owner "${OWNER,,}" \
            --repository "$(basename "$REPOSITORY")" \
            --commit "$COMMIT" \
            --lock Cargo.lock \
            --action action.yml \
            --launcher dist/launcher.js \
            --artifact dist/amiss-linux-x86_64
      - id: action
        uses: ./action-tree
      - if: always() && steps.action.outputs.report != ''
        shell: bash
        env:
          EXIT_CLASS: ${{ steps.action.outputs.exit-class }}
          REPORT: ${{ steps.action.outputs.report }}
        run: |
          set -eu
          echo "exit class ${EXIT_CLASS}"
          jq -e '.schema == "amiss/scanner-report-envelope/v2"' "$REPORT" > /dev/null
          jq -e '.payload.documents | length > 0' "$REPORT" > /dev/null

  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            fuzz/target
          key: fuzz-smoke-${{ hashFiles('rust-toolchain.toml', 'fuzz/Cargo.lock') }}
          restore-keys: fuzz-smoke-
      - run: cargo update --workspace && cargo test --locked --release
        working-directory: fuzz

  platform-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-nextest@0.9.140
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            fuzz/target
          key: platform-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'fuzz/Cargo.lock') }}
          restore-keys: platform-${{ runner.os }}-
      - run: cargo nextest run --workspace --locked
      - run: cargo nextest run -p amiss-scan --test eligibility --release --locked
      - run: cargo update --workspace && cargo test --locked --release
        working-directory: fuzz

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/tools
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: coverage-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: coverage-
      - run: rustup component add llvm-tools-preview
      - run: cargo llvm-cov nextest --workspace --locked --lcov --output-path lcov.info
      - run: cargo llvm-cov report | tee coverage-summary.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
      # The README's coverage rectangle reads a shields endpoint served from
      # the unprotected badges branch; the number is the line percent the
      # report above already printed, taken from the TOTAL row verbatim. The
      # ref moves through the Git Data API, so the token stays in the
      # environment and never touches a git config or a remote URL.
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -eu
          percent="$(awk '/^TOTAL/ { print $(NF-3) }' coverage-summary.txt)"
          case "$percent" in *%) ;; *) echo "no line percent in the report table"; exit 1 ;; esac
          payload="$(printf '{"schemaVersion":1,"label":"coverage","message":"%s","color":"475569"}' "$percent")"
          blob="$(jq -n --arg c "$payload" '{content: $c, encoding: "utf-8"}' \
            | gh api "repos/${REPOSITORY}/git/blobs" --input - --jq .sha)"
          tree="$(jq -n --arg s "$blob" \
            '{tree: [{path: "coverage.json", mode: "100644", type: "blob", sha: $s}]}' \
            | gh api "repos/${REPOSITORY}/git/trees" --input - --jq .sha)"
          commit="$(jq -n --arg t "$tree" '{message: "coverage badge", tree: $t}' \
            | gh api "repos/${REPOSITORY}/git/commits" --input - --jq .sha)"
          if ! jq -n --arg s "$commit" '{sha: $s, force: true}' \
            | gh api -X PATCH "repos/${REPOSITORY}/git/refs/heads/badges" --input - > /dev/null 2>&1; then
            jq -n --arg s "$commit" '{ref: "refs/heads/badges", sha: $s}' \
              | gh api "repos/${REPOSITORY}/git/refs" --input - > /dev/null
          fi
