name: fuzz-long

on:
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-long
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        target: [json, controls, requests, markdown, git_index, git_objects, human]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/tools
      - run: rustup toolchain install nightly --profile minimal
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: corpus-${{ matrix.target }}-
      - run: mkdir -p corpus/${{ matrix.target }}
        working-directory: fuzz
      - run: >-
          cargo +nightly fuzz run ${{ matrix.target }} --features harness
          corpus/${{ matrix.target }} seeds/${{ matrix.target }}
          -- -max_total_time=1200
        working-directory: fuzz
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
