name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: mdbook@0.5.4
      - id: graphviz
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo-tools
          key: docs-mdbook-graphviz0.3.1
      - if: steps.graphviz.outputs.cache-hit != 'true'
        run: cargo install --locked --root ~/.cargo-tools mdbook-graphviz@0.3.1
      - run: |
          echo "$HOME/.cargo-tools/bin" >> "$GITHUB_PATH"
          sudo apt-get update -q && sudo apt-get install -yq graphviz
      - run: mdbook build docs
      # llms-full.txt is the whole book in one fetch, in reading order, for
      # agents that follow llms.txt to its full form.
      - run: |
          {
            printf '# Amiss, the whole book\n'
            grep -oE '\([a-z-]+\.md\)' docs/src/SUMMARY.md | tr -d '()' | while read -r chapter; do
              printf '\n---\n\n'
              cat "docs/src/$chapter"
            done
          } > docs/book/llms-full.txt
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/book

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
