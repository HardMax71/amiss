name: release-plz

on:
  push:
    branches: [main]
  # Recovery path for a stale release PR after an upstream forge outage. A
  # manual run refreshes release metadata but never publishes crates.
  workflow_dispatch:

permissions: {}

jobs:
  release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: release-publication
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require the release token
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "RELEASE_TOKEN is required so a created tag starts the release workflow"
            exit 1
          fi
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-pr:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # release-plz updates the root workspace lockfile, but the controller and
      # fuzz are intentionally separate workspaces. Commit their path-package
      # IDs to the release PR too, so locked CI verifies the repository instead
      # of fixing an incomplete release checkout in place.
      - name: Refresh generated release files in the release PR
        shell: bash
        env:
          PR: ${{ steps.release-plz.outputs.pr }}
          TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          branch="$(jq -r '.head_branch // empty' <<<"$PR")"
          if [[ -z "$branch" ]]; then
            echo "No release PR to refresh"
            exit 0
          fi

          # release-plz rewrites its release-PR branch from the latest main;
          # let only this runner's remote-tracking ref follow that rewrite.
          git fetch --no-tags origin "+refs/heads/${branch}:refs/remotes/origin/${branch}"
          git switch --force-create "$branch" "origin/$branch"
          cargo update --workspace --manifest-path controller/Cargo.toml
          cargo test --manifest-path controller/Cargo.toml --workspace --locked
          cargo update --workspace --manifest-path fuzz/Cargo.toml
          cargo test --manifest-path fuzz/Cargo.toml --locked --release

          version="$(cargo metadata --locked --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "amiss") | .version')"
          matches="$(grep -Ec '^      uses: HardMax71/amiss@action/v[^[:space:]]+$' action.yml)"
          if [ "$matches" -ne 1 ]; then
            echo "The dispatcher must contain exactly one generated Action reference"
            exit 1
          fi
          sed -E -i \
            "s|^(      uses: HardMax71/amiss@action/v)[^[:space:]]+$|\\1${version}|" \
            action.yml
          grep -Fxq "      uses: HardMax71/amiss@action/v${version}" action.yml

          if [[ -n "$(git status --short --untracked-files=all -- . \
            ':(exclude)controller/Cargo.lock' ':(exclude)fuzz/Cargo.lock' \
            ':(exclude)action.yml')" ]]; then
            echo "Refreshing release-generated files changed an unexpected path"
            git status --short
            exit 1
          fi
          if git diff --quiet -- controller/Cargo.lock fuzz/Cargo.lock action.yml; then
            echo "The release-generated files are already current"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add controller/Cargo.lock fuzz/Cargo.lock action.yml
          git commit -m "chore: refresh release-generated files"

          # Authenticate for this push only; do not persist the token in the
          # checkout's config, remote URL, or process arguments.
          helper='!f() { printf "username=x-access-token\npassword=%s\n" "$TOKEN"; }; f'
          git -c credential.helper= -c credential.helper="$helper" \
            push "https://github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${branch}"
