name: security

on:
  schedule:
    - cron: "40 5 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-deny@0.20.2
      - run: cargo deny check advisories sources
      - run: cargo deny check advisories sources
        working-directory: fuzz
      - run: cargo deny --manifest-path controller/Cargo.toml --config controller/deny.toml --workspace check advisories sources

  workflow-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: zizmor@1.26.1
      - env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --min-severity low .github/
