[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Workspace crates are publish = false; the product license is decided at
# release time, so only external dependencies are license-checked for now.
private = { ignore = true }
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Versionless path dependencies between workspace crates are not wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
