[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
private = { ignore = true }
allow = [
  "FSL-1.1-ALv2",
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
exceptions = [
  { allow = ["CDLA-Permissive-2.0"], crate = "webpki-root-certs@1.0.9" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
