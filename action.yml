name: Amiss Documentation Check
description: >-
  Checks documentation against the repository tree it describes and fails the
  run when a reference stops resolving.
branding:
  icon: check-circle
  color: gray-dark

inputs:
  profile:
    description: observe (findings do not block) or enforce (blocking findings fail the run)
    default: enforce
  base:
    description: >-
      full base commit id; when empty, pull requests derive the candidate's
      first parent and other events read the payload
    default: ""
  candidate:
    description: full candidate commit id; derived from the triggering event when empty
    default: ""
  repo:
    description: path to the repository root inside the workspace
    default: "."
  object-format:
    description: sha1 or sha256
    default: sha1
  annotations:
    description: emit candidate-located displayed Fixes and scan errors as file annotations
    default: "true"
  watchdog-seconds:
    description: wall-clock seconds the scan may take before it is ended with no result
    default: "120"

outputs:
  exit-class:
    description: the engine's exit class, 0, 1, or 2
    value: ${{ steps.amiss.outputs.exit-class }}
  report:
    description: path to the machine report, one canonical JSON line
    value: ${{ steps.amiss.outputs.report }}

runs:
  using: composite
  steps:
    - id: amiss
      uses: HardMax71/amiss@action/v0.9.0
      with:
        profile: ${{ inputs.profile }}
        base: ${{ inputs.base }}
        candidate: ${{ inputs.candidate }}
        repo: ${{ inputs.repo }}
        object-format: ${{ inputs.object-format }}
        annotations: ${{ inputs.annotations }}
        watchdog-seconds: ${{ inputs.watchdog-seconds }}
