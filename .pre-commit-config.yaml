minimum_prek_version: "0.4.9"
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
exclude: ^(spec|corpus|fuzz/seeds|docs/src/fonts)/ # byte-exact assets: schemas, corpus, seeds, fonts

repos:
  - repo: builtin
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: no-file-start-comments
        name: no file-start comments
        entry: >-
          awk 'FNR==1{j=0} !j&&NF{sub(/^[ \t]+/,""); if(/^\/[\/*]/||(/^#/&&!/^#[![]/)){print FILENAME": file starts with a comment";e=1} j=1} END{exit e}'
        language: system
        types: [text]
        exclude: (^|/)Cargo\.lock$|\.md$|(^|/)llms\.txt$
      - id: no-tests-in-src
        name: tests live outside src/
        entry: >-
          awk '/#\[test\]|#\[cfg\(test\)\]/{print FILENAME": test code inside implementation";e=1} END{exit e}'
        language: system
        files: ^(crates/[^/]+|controller(/[^/]+)?)/src/.*\.rs$
      # The README says the engine never runs anything and never shells out to
      # git, and until now the only thing holding that up was everyone
      # remembering. The bootstrap is the one crate that may spawn: launching the
      # engine is its whole job, and it is deliberately outside this filter.
      - id: no-subprocess-in-engine
        name: the engine spawns nothing
        entry: >-
          awk '/Command::new|process::Command/{print FILENAME": the engine never shells out";e=1} END{exit e}'
        language: system
        files: ^crates/amiss(-scan|-git|-md|-wire)?/src/.*\.rs$
      # A required check that filters itself out by path is a check a pull request
      # can route around: touch only the excluded paths and the merge shows green
      # for a gate that never ran. The other workflows are schedule and dispatch
      # lanes, so this pins ci.yml alone.
      - id: no-path-filters-on-ci
        name: the required check cannot be routed around
        entry: >-
          awk '/^on:/{o=1;next} /^[^ #]/{o=0} o&&/^ +paths(-ignore)?:/{print FILENAME": a path filter lets a merge skip the required check";e=1} END{exit e}'
        language: system
        files: ^\.github/workflows/ci\.yml$
      - id: zizmor
        name: zizmor
        entry: zizmor --offline
        language: system
        files: ^\.github/(workflows/[^/]+|actions/[^/]+/action)\.ya?ml$
      - id: typos
        name: typos
        entry: typos
        language: system
        # commit-range hex in the scan ledger tokenizes into short words
        exclude: (^|/)ledger\.md$
      - id: fmt
        name: cargo fmt
        entry: cargo fmt --
        language: system
        types: [rust]
        exclude: ^controller/
        require_serial: true # parallel batches race rustup's toolchain auto-install
      - id: controller-fmt
        name: controller cargo fmt
        entry: cargo fmt --manifest-path controller/Cargo.toml --all --
        language: system
        files: ^controller/.*\.rs$
        pass_filenames: false
        require_serial: true
      - id: clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --locked -- -D warnings
        language: system
        types_or: [rust, toml]
        pass_filenames: false
        stages: [pre-push]
      - id: controller-clippy
        name: controller cargo clippy
        entry: cargo clippy --manifest-path controller/Cargo.toml --workspace --all-targets --locked -- -D warnings
        language: system
        files: ^(Cargo\.toml|controller/(Cargo\.(toml|lock)|.*/Cargo\.toml|clippy\.toml|.*\.rs)|crates/(amiss-bootstrap|amiss-fixtures|amiss-git|amiss-wire)/(Cargo\.toml|src/.*\.rs)|rust-toolchain\.toml)$
        pass_filenames: false
        stages: [pre-push]
      - id: nextest
        name: cargo nextest
        entry: cargo nextest run --workspace --locked
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: controller-nextest
        name: controller cargo nextest
        entry: cargo nextest run --manifest-path controller/Cargo.toml --workspace --locked
        language: system
        files: ^(Cargo\.toml|controller/(Cargo\.(toml|lock)|.*/Cargo\.toml|.*\.rs)|crates/(amiss-bootstrap|amiss-fixtures|amiss-git|amiss-wire)/(Cargo\.toml|src/.*\.rs)|rust-toolchain\.toml)$
        pass_filenames: false
        stages: [pre-push]
      - id: deny
        name: cargo deny
        entry: cargo deny check
        language: system
        files: (^|/)(Cargo\.(toml|lock)|deny\.toml)$
        pass_filenames: false
        stages: [pre-push]
      - id: controller-deny
        name: controller cargo deny
        entry: cargo deny --manifest-path controller/Cargo.toml --config controller/deny.toml --workspace check
        language: system
        files: ^(Cargo\.toml|controller/(Cargo\.(toml|lock)|.*/Cargo\.toml|deny\.toml)|crates/(amiss-bootstrap|amiss-fixtures|amiss-git|amiss-wire)/Cargo\.toml|rust-toolchain\.toml)$
        pass_filenames: false
        stages: [pre-push]
      - id: shear
        name: cargo shear
        entry: cargo shear
        language: system
        types_or: [rust, toml]
        pass_filenames: false
        stages: [pre-push]
      - id: controller-shear
        name: controller cargo shear
        entry: cargo shear --locked controller
        language: system
        files: ^(Cargo\.toml|controller/(Cargo\.(toml|lock)|.*/Cargo\.toml|.*\.rs)|crates/(amiss-bootstrap|amiss-fixtures|amiss-git|amiss-wire)/(Cargo\.toml|src/.*\.rs)|rust-toolchain\.toml)$
        pass_filenames: false
        stages: [pre-push]
      # Whole functions compared by AST edit distance: threshold 0.85, eight
      # lines minimum, counted by a pinned similarity-rs. The baseline is exact
      # rather than a ceiling, so a new twin fails as a regression and a cleanup
      # lowers the number in the same change.
      - id: similarity-ratchet
        name: function twins stay at the baseline
        entry: >-
          sh -c 'set -eu;
          want="similarity-rs 0.5.0"; have="$(similarity-rs --version)";
          [ "$have" = "$want" ] || { echo "the ratchet pins $want, found $have"; exit 1; };
          pairs="$(similarity-rs crates controller --threshold 0.85 --min-lines 8 | grep -c "Similarity:" || true)";
          baseline=171;
          [ "$pairs" -eq "$baseline" ] ||
          { echo "near-twin function pairs: $pairs, baseline $baseline
          (similarity-rs crates controller --threshold 0.85 --min-lines 8)"; exit 1; }'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
      # The pinned similarity-rs compares functions within one file only, so the
      # deliberate provider twin files are concatenated per trio before scanning.
      # Cross-file twins in these trios are otherwise invisible to any gate.
      - id: twin-trio-ratchet
        name: provider twin trios stay at the baseline
        entry: >-
          sh -c 'set -eu;
          want="similarity-rs 0.5.0"; have="$(similarity-rs --version)";
          [ "$have" = "$want" ] || { echo "the ratchet pins $want, found $have"; exit 1; };
          dir="$(mktemp -d)"; trap "rm -rf $dir" EXIT;
          cat controller/gitea/src/live/rest/transport.rs controller/github/src/live/rest/transport.rs controller/gitlab/src/live/transport.rs > "$dir/transports.rs";
          cat controller/gitea-service/tests/lane/harness.rs controller/github-service/tests/lane/harness.rs controller/gitlab-service/tests/lane/harness.rs > "$dir/harnesses.rs";
          cat controller/gitea-service/src/runtime.rs controller/github-service/src/runtime.rs controller/gitlab-service/src/runtime.rs > "$dir/runtimes.rs";
          pairs="$(similarity-rs "$dir" --threshold 0.85 --min-lines 8 | grep -c "Similarity:" || true)";
          baseline=30;
          [ "$pairs" -eq "$baseline" ] ||
          { echo "provider twin-trio pairs: $pairs, baseline $baseline
          (concatenate each trio, then similarity-rs --threshold 0.85 --min-lines 8)"; exit 1; }'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]
